# roadmap/v1-issues.yaml
#
# v1 application roadmap — 45 entries across 6 tracks.
# Authored during planning sessions for MultiAgency/kanban v0.
#
# Schema per entry:
#   id            letter-prefix unique within the file (A1, D6, API2a, etc.)
#   track         one of: architecture | data-model | api | integration | ui | research-docs
#   title         the issue title
#   labels        array of label slugs from .github/labels.yml
#   depends_on    array of letter-prefix ids that must close before this is ready
#   body          markdown issue body
#
# Bulk-push (T5.4) responsibilities:
#   1. Pass 1: gh issue create per entry, capture letter-prefix → #N mapping.
#   2. Pass 2: replace every letter-prefix occurrence in body text and
#      depends_on with its mapped #N reference. Single regex pass over body
#      handles both depends_on metadata AND in-body prose references
#      (e.g. "INT5's scope", "API4 will implement").
#
# Layer-0 (ready) at authoring: 21 entries total =
#   20 ready+agent-eligible (one per major track L0 plus several research/docs backups,
#     plus A5 added post-authoring as a pre-resolved bundler ADR)
#   + 1 ready+human-only (RD1b, perma-deferred until v0 has deployed users)

# ============================================================
# Architecture track (5 entries)
# ============================================================

- id: A1
  track: architecture
  title: "ADR: v1 web framework (Hono)"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Decision pre-resolved: **v1's web framework is Hono.** This issue
    writes the ADR documenting the choice; it does not re-evaluate.

    Evaluate Hono against Fastify and Express on the criteria below so
    the rationale is honest and the rejected-alternatives section is
    well-grounded:

    - TypeScript-native types and inference
    - OpenAPI generation support
    - Minimal runtime dependency footprint
    - License compatibility with dual MIT/Apache-2.0
    - Ecosystem maturity
    - Self-host friendliness

    **Output:** `docs/adr/0001-web-framework.md` containing:
    - Hono as the chosen framework with rationale
    - Fastify and Express as rejected alternatives, one-paragraph
      rationale each
    - A criteria-by-criteria comparison table

    **Downstream effect:** API3's "If A1 chose Hono → (b) via
    `@hono/zod-openapi` is the strong default" branch is now active.
    A1 does not pre-decide API3; the agent claiming API3 may treat
    the Hono lock as input.

- id: A2
  track: architecture
  title: "ADR: v1 repo placement"
  labels:
    - ready
    - agent-eligible
    - skill:research
  depends_on: []
  body: |
    Decide where v1 application source lives. Compare:

    **(a) This repo gains a `v1/` directory.** Single repo for v0 convention,
    Action, and v1 app; shared utilities like `parseHandoff` import via
    relative paths. *Hidden cost:* this repo is a GitHub template; every
    downstream fork inherits the v1 source whether they want it or not.
    Forks that want pure-convention adoption have to delete `v1/` after
    forking.

    **(b) New repo `MultiAgency/kanban-app`.** Clean separation;
    `parseHandoff` published as an npm package consumed by both repos so
    neither owns the other's release cadence. *Net benefit:* keeps the
    template repo clean for forking; v1 app source isn't carried by users
    who only want the convention.

    **(c) Monorepo split with workspaces.** One umbrella repo containing
    v0 template, v1 app, and shared utilities as separate workspaces; clean
    import paths without coupling release cadences. *Trade-off:* cleanest
    import paths but workspace tooling (npm workspaces, pnpm, or similar)
    is not part of v0's Tech Stack — adopting it would expand the v0
    build surface to support v1's needs, violating v0's "cheapest
    validation path" principle.

    Constraints:
    - `parseHandoff` and other shared utilities need a clean import path
    - The v0 template repo must stay clean for forking
    - v0 and v1 may release on different cadences

    **Output:** `docs/adr/0002-repo-placement.md` with the chosen option,
    a one-paragraph rationale per rejected option, and a migration sketch
    if the chosen option requires moving away from the current single-repo
    state.

- id: A3
  track: architecture
  title: "ADR: web/worker process model"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [A1]
  body: |
    Specify how the single Docker image runs as either a web server or a
    worker process.

    Cover:

    - **Entry commands per role.** How `docker run <image> web` vs
      `docker run <image> worker` dispatch to different process types from
      the same image.
    - **When a deployment needs the worker.** Cron-pull mode (sync-mode
      projects whose installation can't expose public webhooks); async
      job-queue drain (a small job table drained by the worker process
      with at-least-once semantics; no framework dependency).
    - **When web-only suffices.** Pure-app projects with no GitHub-sync
      cron and a low-volume job table that can drain inline.
    - **Healthcheck conventions.** `/healthz` endpoint shape; what each
      process role reports as healthy vs degraded.
    - **Graceful shutdown.** SIGTERM handling, in-flight request draining,
      job-table claim release on worker shutdown.
    - **At-least-once retry semantics for the job table.** Retry budget,
      poison-pill detection, dead-letter handling.

    Depends on A1's framework choice — healthcheck integration and
    middleware shape differ across Hono / Fastify / Express.

    **Output:** `docs/adr/0003-web-worker-model.md`

- id: A4
  track: architecture
  title: "ADR: observability stack"
  labels:
    - ready
    - agent-eligible
    - skill:research
  depends_on: []
  body: |
    Pick logging / metrics / tracing for v1.

    - **Logging.** pino vs winston vs native `console`. Default lean:
      pino unless compelling reason otherwise (structured JSON output by
      default, lowest-overhead, broad ecosystem).
    - **Metrics.** Prometheus `/metrics` endpoint, none, or custom.
      Constrain to options that work for self-hosted deployments without
      external service dependencies.
    - **Tracing.** OpenTelemetry-instrumented or deferred to v1.5. If
      included in v1, must remain optional (no mandatory exporter;
      default to a no-op exporter).

    Hard constraint: must work for self-hosted deployments with zero
    external service dependencies. No mandatory Datadog / Sentry /
    Honeycomb / similar.

    **Recommendation:** defer tracing to v1.5 unless the agent's research
    surfaces a specific reason v1 needs it (e.g., distributed-system
    debugging that prints/logs can't handle). Default disposition:
    deferred. Logging is sufficient for v1's operational needs at
    single-tenant scale; tracing complexity earns its place when v1
    deployments hit multi-tenant + multi-process scale where logs become
    harder to correlate.

    **Output:** `docs/adr/0004-observability.md`

- id: A5
  track: architecture
  title: "ADR: v1 UI bundler (rsbuild)"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Decision pre-resolved: **v1's UI bundler is rsbuild.** This issue
    writes the ADR documenting the choice; it does not re-evaluate.

    Evaluate rsbuild against the alternatives below for an honest
    rationale and well-grounded rejected-alternatives section:

    - rsbuild (Rspack-based; fast HMR; production-grade Module
      Federation support if v1 ever needs runtime composition;
      aligns with the `nearbuilders/everything-dev` reference
      architecture cited at decision time).
    - Vite (mature, fast HMR, Rollup-based prod builds; broad
      ecosystem; the most natural alternative).
    - Webpack (incumbent; mature; slower; rsbuild's predecessor in
      spirit).

    **Out of scope:** the v0 GitHub Action keeps esbuild. Different
    problem (single-file CJS Node 24 bundle for the Action runtime —
    byte-stable target). Do not propose unifying v0 and v1 on a
    single bundler; the constraints differ and esbuild is the right
    fit for the v0 Action's surface.

    **Output:** `docs/adr/0005-ui-bundler.md` containing:
    - rsbuild as the chosen UI bundler with rationale
    - Two rejected alternatives with one-paragraph rationale each
    - A criteria-by-criteria comparison table
    - One-paragraph note on why v0's Action keeps esbuild
      (different problem, byte-stable Node-CJS target)

    **Cross-track context:** UI3–UI8 consume the bundler decision.
    This ADR is a soft input — the bundler is locked here, but the
    UI track's hard dep is UI2 (design system), not A5.

# ============================================================
# Data model track (8 entries)
# ============================================================

- id: D6
  track: data-model
  title: "Schema portability spec (SQLite ↔ Postgres + Drizzle conventions)"
  labels:
    - ready
    - agent-eligible
    - skill:research
  depends_on: []
  body: |
    Document the rules every v1 schema file must follow to remain portable
    between SQLite and Postgres. v1 uses Drizzle ORM as the abstraction;
    schema portability between SQLite and Postgres is a non-negotiable v1
    design constraint (single-deploy SQLite must remain a first-class option,
    and the seamless `DATABASE_URL=postgres` switch depends on it).

    Cover:

    - **(a) Types.** Use Drizzle's portable type set (`text`, `integer`,
      `real`, `blob`, `timestamp`); avoid Postgres-only types (`uuid`,
      `jsonb`, `array`, `hstore`) unless an explicit SQLite fallback
      is specified.
    - **(b) Constraints.** PK / FK / UNIQUE / CHECK supported in both
      dialects; document the small CHECK-syntax differences.
    - **(c) Indexes.** Partial indexes work in both with slight syntax
      differences; document them.
    - **(d) JSON columns.** TEXT in SQLite, JSONB in Postgres, accessed
      via Drizzle's `json` type wrapper.
    - **(e) Migrations.** `drizzle-kit generate` workflow against both
      dialects; document the workflow.

    **Output:** `docs/schema/portability.md` plus a sample portable schema
    file demonstrating the conventions in practice.

- id: D7
  track: data-model
  title: "tenant_id surface specification"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Specify how `tenant_id` appears in the data model and is enforced at
    the query layer. v1's design rule: every table reserves a `tenant_id`
    column from day one so that the multi-tenant flip later is a backfill,
    not a migration. v1 ships single-tenant by default; the column is
    forward-compat for the eventual `MULTI_TENANT=true` flag.

    Cover:

    - **(a)** Every table has a non-null `tenant_id` column with a default
      value of `'default'` (the constant for single-tenant deployments).
    - **(b)** All FK relationships include `tenant_id` in composite keys
      to prevent cross-tenant references at the schema level.
    - **(c)** Middleware sets a tenant context on each request derived
      from the authenticated session.
    - **(d)** Drizzle queries are wrapped to inject `tenant_id`
      automatically so application code can't accidentally bypass it.
    - **(e)** The `MULTI_TENANT=true` flag gates the middleware's tenant
      resolution — off forces `'default'`; on derives from session /
      subdomain / etc. The subdomain resolution mechanism is a separate
      ADR, out of scope for this issue.

    **Output:** `docs/schema/tenant-id-surface.md` plus a sample middleware
    outline demonstrating the wrap pattern.

- id: D8
  track: data-model
  title: "Skill table and join tables (TaskSkill, AgentSkill)"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D6, D7]
  body: |
    Define the canonical Skill table seeded with the v0 skill set
    (`research`, `writing`, `translation`, `code`, `review` per SPEC.md
    §Canonical labels) plus the join tables TaskSkill and AgentSkill.

    Cover:

    - **(a) Skill names match GitHub label slugs.** `Skill.name` values
      match the `skill:*` label slugs in `.github/labels.yml` exactly so
      v1's labels and v0's labels stay synchronized.
    - **(b) Seeding is migration-driven.** New skills are added via
      migration, not hardcoded. The v0 set ships in the initial migration.
    - **(c) IronHub is the canonical source long-term.** v1's Skill table
      is a synced cache of IronHub's skill registry; the sync mechanism
      is INT5's scope (IronHub skill matching ADR), not this issue's.
    - **(d) tenant_id propagates through joins.** TaskSkill and AgentSkill
      both carry `tenant_id` per D7's surface spec.

    Cross-track context: D1 (Task entity) and D3 (Agent entity) both
    formally depend on D8 — closing D8 unblocks the M:N join definitions
    in those issues. Constraints follow D6.

    **Output:** `src/db/schema/skill.ts` + `docs/schema/skill.md`

- id: D2
  track: data-model
  title: "Project entity schema"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D6, D7]
  body: |
    Define the Project entity.

    Schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7 surface spec
    - `owner_agent_id` FK Agent
    - `name` text
    - `description` text/markdown
    - `mode` enum: `pure-app` | `sync-mode`
      (note: pure-convention is the absence of a Project row, not a state
      on this table)
    - **(INT7 marker)** an `authoritative_side` column will be added
      here by INT7's deliverable PR — `'github' | 'app'`, default
      `'github'`, additive (do not alter the `mode` enum). Place a
      code-comment in the schema source at this exact position so the
      future PR is mechanical rather than archaeological. Comment
      shape (type and constraint follow D6 portability — text with a
      CHECK rather than a Postgres-only enum):
      ```
      // INT7 will add authoritative_side: text NOT NULL DEFAULT 'github',
      // CHECK (authoritative_side IN ('github', 'app')). Additive —
      // do not alter the mode enum.
      ```
    - `github_repo_url` nullable text — present in sync-mode only
    - `settings` JSON column for project-scoped config
    - `created_at`, `updated_at`

    Indexes:
    - `(tenant_id)` for tenant-scoped listing
    - `(owner_agent_id)` for "projects I own" queries
    - `(github_repo_url)` unique partial index

    Constraints follow D6. tenant_id follows D7. Per INT7's
    schema-update commitment, the `authoritative_side` column lands as
    part of INT7's deliverable PR — the code-comment marker above
    indicates the line where that edit is expected.

    **Output:** `src/db/schema/project.ts` + `docs/schema/project.md`

- id: D1
  track: data-model
  title: "Task entity schema"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D6, D7, D8]
  body: |
    Define the canonical Task table for v1.

    Schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7
    - `project_id` FK Project
    - `title` text
    - `body` text/markdown
    - `state` enum: `ready` | `in-progress` | `blocked` | `closed`
      (matches SPEC.md §Convention Rule 1 — closing the issue means done;
      no `done` label or state)
    - `assignee_id` FK Agent, nullable
    - `github_issue_url` nullable text — present in sync-mode projects,
      null in pure-app projects
    - `created_at`, `updated_at`
    - M:N to Skill via TaskSkill join (defined in D8)

    Indexes:
    - `(project_id, state)` for board-view queries
    - `(assignee_id)` for "tasks I'm working on" queries
    - `(github_issue_url)` unique partial index — uniqueness only when
      the URL is present

    Constraints follow D6 portability spec. tenant_id semantics follow
    D7. M:N join references D8's Skill + TaskSkill schema.

    **Output:** `src/db/schema/task.ts` + `docs/schema/task.md` justifying
    the choices.

- id: D3
  track: data-model
  title: "Agent entity schema (human/agent unified)"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D6, D7, D8]
  body: |
    Define the Agent table covering both humans and IronClaw agents via
    a `kind` discriminator. v1's modeling rule: Agent is human-or-IronClaw
    on one table; GitHub identity is the join key (the same GitHub login
    that owns the OAuth session or the PAT). One table simplifies queries
    (assignment, presence, suggestion) at the cost of a few null columns
    per row that don't apply to the other kind.

    Schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7
    - `kind` enum: `human` | `ironclaw`
    - `github_login` text, unique within tenant
    - `display_name` text
    - `avatar_url` text
    - M:N to Skill via AgentSkill join (defined in D8)
    - `created_at`, `updated_at`, `last_active_at`

    IronClaw-only fields (nullable for humans):
    - `ironclaw_routine_id` text
    - `owner_agent_id` FK Agent — the human who registered the bot

    Constraints (CHECK):
    - When `kind = 'ironclaw'`, `ironclaw_routine_id` and `owner_agent_id`
      are required (NOT NULL).
    - When `kind = 'human'`, both must be NULL.

    Output explains the unified-table rationale (rather than separate
    User and Bot tables) — primarily that claims, handoffs, and presence
    indicators all need to address either kind through the same FK,
    avoiding polymorphic associations.

    **Output:** `src/db/schema/agent.ts` + `docs/schema/agent.md`

- id: D5
  track: data-model
  title: "Dependency edges (typed self-referential)"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D1]
  body: |
    Define the Dependency edge.

    Schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7
    - `from_task_id` FK Task — the dependent
    - `to_task_id` FK Task — the parent
    - `kind` enum: `blocks` (hard, gates ready→in-progress) |
      `tracks` (soft sub-issue, doesn't gate)
    - `created_at`

    Constraints:
    - `from_task_id != to_task_id` (CHECK; no self-loops)
    - Composite UNIQUE on `(from_task_id, to_task_id, kind)` to prevent
      duplicate edges of the same type

    Indexes:
    - `(from_task_id)` for outgoing-edge lookup
    - `(to_task_id)` for incoming-edge lookup

    **Cycle detection is out of scope for the schema** — enforced at the
    API/service layer. Specification: when a Dependency is being created,
    the service performs a depth-bounded BFS from `from_task_id` following
    existing edges; if the proposed `to_task_id` is reachable, reject
    with HTTP 409. Bound depth to 100 to prevent pathological scans on
    adversarial graphs. This rule is documented in this ADR but
    implemented in the API track.

    **Implementation lands in API4** (REST CRUD surface) when
    Dependency-creation endpoints are specified, or **API5** (event-verb
    endpoints) if dependency promotion happens via verb. The agent
    authoring API4/API5 should cite D5 as the source of the
    cycle-detection rule.

    **Output:** `src/db/schema/dependency.ts` + `docs/schema/dependency.md`

- id: D4
  track: data-model
  title: "Claim and Handoff event records"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D1, D3]
  body: |
    Define two append-only event tables.

    **Claim** schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7
    - `task_id` FK Task
    - `agent_id` FK Agent
    - `claimed_at` timestamp
    - `released_at` timestamp, nullable (NULL while active)
    - `released_reason` enum: `completed` | `blocked` | `abandoned` |
      `preempted`, nullable

    **Handoff** schema:
    - `id` BIGINT primary key
    - `tenant_id` per D7
    - `task_id` FK Task
    - `agent_id` FK Agent
    - `posted_at` timestamp
    - `parsed_metadata` JSON — output of `parseHandoff` from the v0
      shared library (the handoff format is the v0 spec, byte-identical,
      and evolves additively: v1 readers must accept all v0 handoffs)
    - `raw_body` text — the full comment body
    - `github_comment_url` nullable text — present in sync-mode projects

    Both tables are append-only:
    - Claim: only `released_at` and `released_reason` are mutable, and
      only as a single transition (active → released).
    - Handoff: never mutated after insert.

    Indexes:
    - Claim `(task_id) WHERE released_at IS NULL` — partial index per
      D6 conventions, fast active-claim lookup
    - Handoff `(task_id, posted_at)` for time-ordered listing

    JSON column conventions follow D6. tenant_id follows D7.

    **Output:** `src/db/schema/events.ts` + `docs/schema/events.md`

# ============================================================
# API track (8 entries)
# ============================================================

- id: API1
  track: api
  title: "REST + OpenAPI conventions"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Document v1's API conventions before any endpoint is specified.
    v1 chooses REST + JSON + OpenAPI (no GraphQL); re-deciding the
    protocol style is out of scope for this issue (RD2 writes the
    rationale separately).

    Cover:

    - **URL slug case.** Default kebab-case, plural resources
      (`/v1/projects/:id/tasks`).
    - **JSON casing.** camelCase; snake_case rejected to match TypeScript
      ergonomics.
    - **Error envelope.** RFC 7807 Problem+JSON.
    - **Standard error codes.** `validation_failed`, `unauthorized`,
      `forbidden`, `not_found`, `conflict`, `rate_limited`.
    - **Request validation library.** Zod default.
    - **Response envelope.** Raw resource, no `data:` wrapping.
    - **Versioning strategy.** `/v1/` prefix locked; `/v2/` adoption
      rules deferred.

    Closing API1 unblocks API4, API5, API6, API7 simultaneously — these
    four downstream issues all inherit conventions from this one.

    **Output:** `docs/api/0000-conventions.md`

- id: API2a
  track: api
  title: "ADR: auth modes shortlist"
  labels:
    - ready
    - agent-eligible
    - skill:research
  depends_on: []
  body: |
    Survey the three auth modes for v1 and produce a per-route accepted-
    token matrix. v1's auth approach: GitHub OAuth (browser sessions)
    plus GitHub PAT (API), with no NEAR-wallet dependency. The product
    is GitHub-centric — every Agent identity already has a GitHub login —
    so layering a separate wallet identity at v1 adds friction without
    enabling anything v1 needs. Wallet identity is a v2+ question.

    Cover:

    - **(a) Session cookies for browser UI.** GitHub OAuth flow → app
      session cookie. Recommend session storage mechanism at a high
      level only — JWT-vs-server-side-table is NOT decided here, that
      is API2b's scope.
    - **(b) GitHub PAT for programmatic API consumers.** App validates
      against GitHub's `/user`. No token storage (or hashed-only).
    - **(c) App-installation tokens for high-volume integrations.**
      GitHub App registered, installation tokens minted per-tenant.

    Per-route matrix: which routes accept which token types. UI routes
    accept (a). API routes accept (b) and (c). Webhook routes accept
    GitHub's signature scheme (separate; API7's scope).

    **Out of scope for this issue:** session storage mechanism (API2b),
    token-revocation implementation, audit-log shape.

    **Output:** `docs/api/0001-auth-modes.md` (~1 page)

- id: API2b
  track: api
  title: "ADR: session implementation"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [API2a]
  body: |
    Decide v1's session storage mechanism. API2a settled the auth
    modes; this issue picks the implementation for the session-cookie
    path.

    Decision:
    - **JWT (stateless).** Easier to scale horizontally; harder to
      revoke (need a denylist or short expiry).
    - **Server-side session table.** Stateful; simpler revocation
      (delete the row); requires session storage that survives
      container restarts (DB-backed via D7's Drizzle schema).

    Cover:
    - Chosen mechanism with rationale
    - Expiry strategy and refresh flow
    - Revocation flow (logout, "log out everywhere", admin-driven)
    - Cookie attributes: `HttpOnly`, `Secure`, `SameSite=Lax` (or
      `Strict` if cross-site flows are out of scope)

    **Cross-track context:** if the chosen mechanism requires a Sessions
    table, that schema is implementation-time work — added to the
    data-model when v1 implementation begins, not now during roadmap
    authoring. The agent claiming API2b records the table requirement
    in its handoff for the v1 implementer to consume.

    **Output:** `docs/api/0001b-session-impl.md`

- id: API3
  track: api
  title: "ADR: OpenAPI generation tooling"
  labels:
    - blocked
    - agent-eligible
    - skill:research
  depends_on: [A1]
  body: |
    Decide how v1 generates and serves its OpenAPI spec. The chosen
    framework from A1 narrows the tooling — read A1's handoff before
    starting this issue.

    Options:
    - **(a) Hand-authored YAML** in `docs/api/openapi.yaml`, manually
      synced. Cheapest to start, expensive to maintain.
    - **(b) Generated from route-handler annotations.** Hono has
      `@hono/zod-openapi`; Fastify has its built-in OpenAPI plugin.
    - **(c) Generated from Zod schemas** via `zod-openapi`. Works
      across frameworks; requires more glue.

    Per-framework recommendation:
    - If A1 chose Hono → (b) via `@hono/zod-openapi` is the strong
      default.
    - If A1 chose Fastify → (b) via the built-in plugin is the
      strong default.
    - If A1 chose Express → (c) since Express has weaker generation,
      pushing toward Zod-driven.

    **Cross-track dep:** A1 (web framework selection in architecture
    track). The agent claiming API3 reads A1's handoff first to know
    which framework's tooling to recommend.

    **Output:** `docs/api/0002-openapi-tooling.md` + setup recipe.

- id: API4
  track: api
  title: "REST CRUD surface"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [API1, D1, D2, D3, D5, D8]
  body: |
    Define CRUD endpoints for Projects, Tasks, Agents, Dependencies,
    and Skills. URL shapes inherit from API1; resource shapes inherit
    from data-model schemas D1/D2/D3/D5/D8.

    Cover:
    - URL patterns (`/v1/projects`, `/v1/projects/:id/tasks`,
      `/v1/agents`, `/v1/projects/:id/dependencies`, `/v1/skills`).
    - HTTP verbs per resource (POST create / GET list / GET item /
      PATCH update / DELETE remove).
    - Request and response shapes referencing the schemas from D1,
      D2, D3, D5, D8.
    - **Pagination.** Cursor-based (not offset/limit). Cursor encoding
      recommendation: opaque base64-encoded JSON containing the last
      item's primary sort field value plus its ID. Cursors must be
      signed (HMAC) so clients can't tamper with the sort field to
      skip ahead. Alternative encodings (ULID-based, signed-only,
      etc.) are acceptable if the rationale is documented. The cursor
      format is internal — clients treat it as opaque.
    - Filter and sort surface (which fields filter by, how sorts
      compose).
    - **Dependency-creation endpoint** picks up D5's cycle-detection
      rule: depth-bounded BFS from `from_task_id`, depth bound 100,
      reject reachable `to_task_id` with HTTP 409.

    **Cross-track deps:** API1 (conventions), D1 (Task), D2 (Project),
    D3 (Agent), D5 (Dependency), D8 (Skill). Read each upstream issue's
    handoff before authoring response shapes.

    **Output:** `docs/api/0003-crud-surface.md` + OpenAPI fragment.

- id: API5
  track: api
