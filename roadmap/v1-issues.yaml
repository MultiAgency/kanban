  depends_on: [D3, D8]
  body: |
    Specify how v1 queries IronHub at issue creation to suggest agents
    whose registered skills match the issue's `skill:*` labels. v1's
    design: at issue creation the app queries IronHub for agents whose
    registered skills match the issue's `skill:*` labels and surfaces
    them as suggested assignees. The suggestion is preview-only — claim
    is still explicit per SPEC.md §Convention Rule 2 — but the discovery
    closes the gap between "this issue needs `skill:research`" and
    "which of the registered agents can claim it."

    Cover:

    - **IronHub's skill-query API surface.** Research what IronHub
      exposes today. Reference: [nearai/ironhub](https://github.com/nearai/ironhub)
      for the current API. If no public skill-query API exists yet,
      this issue's deliverable includes a proposed API contract for
      IronHub to add (cross-org coordination — flag in handoff).
    - **v1's caching strategy.** TTL on cached responses; invalidation
      events from IronHub if available; fallback to no-cache if IronHub
      doesn't support invalidation.
    - **UI surface.** Preview-only suggestions, never auto-assign. The
      claim mechanism (SPEC.md §Convention Rule 2) requires explicit
      self-assignment; IronHub suggestions don't bypass that.
    - **Tenant boundary.** Suggestions only include agents in the
      project's collaborator set or the tenant. No cross-tenant
      visibility.
    - **Graceful degradation.** When IronHub is unavailable, suggestions
