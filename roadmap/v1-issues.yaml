  depends_on: [API1, D1, D4]
  body: |
    Define non-CRUD verb endpoints that drive Task state transitions.

    Endpoints:
    - `POST /v1/tasks/:id/claim` — agent or human claims the task
    - `POST /v1/tasks/:id/complete` — body includes the handoff
      payload; writes to D4's Handoff table
    - `POST /v1/tasks/:id/block` — body includes block reason
    - `POST /v1/tasks/:id/unblock` — restores `in-progress` if claim
      is still active, else `ready` with assignee cleared (matches
      SPEC.md §Convention Rule 5)

    Cover:
    - Request shapes per verb
    - Idempotency via `Idempotency-Key` header (retry-safe)
    - State-transition validation (can't `complete` an unclaimed
      task; can't `block` a closed task; matches SPEC.md §Convention
      Rule 2's claim-as-one-step semantics)
    - How Claim and Handoff records get written per D4's schema
    - Conflict semantics (409 if state has shifted since the request
      was authored)

    **Cross-track deps:** API1 (conventions), D1 (Task state enum),
    D4 (Claim and Handoff event records).

    **Output:** `docs/api/0004-event-verbs.md` + OpenAPI fragment.

- id: API6
  track: api
  title: "SSE channel for real-time updates"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [API1, D1]
  body: |
    Specify the Server-Sent Events surface for live updates.
    v1 uses Server-Sent Events for real-time updates, not WebSockets:
    SSE is simpler to self-host (no WS-upgrade proxy work, no sticky
    sessions) and sufficient for kanban presence indicators (clients
    are read-mostly; writes go through API verbs). Re-deciding SSE-vs-WS
    is out of scope (RD4 writes the rationale separately).

    Endpoint: `GET /v1/projects/:id/events`

    Cover:
    - **Event types.** `task.created`, `task.state_changed`,
      `claim.created`, `handoff.posted`, `agent.presence`.
    - **Payload shapes.** Deltas, not full state. Each event includes
      enough fields to update a client cache without re-fetching.
    - **Reconnection semantics.** `Last-Event-ID` header on reconnect
      replays missed events. Document the replay window (e.g. 5
      minutes; events older than that force a full re-fetch).
    - **Authentication on long-lived streams.** Token-in-query-string
      vs cookie behavior across browsers; recommend cookie.
    - **Idle timeout / heartbeat.** Heartbeat events every 30s to
      detect dead connections through proxies.
    - **Tenant isolation.** No cross-tenant event leakage; the
      tenant context from D7's middleware filters every event.

    **Cross-track deps:** API1 (conventions), D1 (Task state for
    `task.state_changed` payloads).

    Consumed downstream by UI6 (agent presence renderer in the UI
    track).

    **Output:** `docs/api/0005-sse-channel.md`

- id: API7
  track: api
  title: "GitHub-sync mechanics (webhook receiver + outbound pull)"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [API1, D1, D2, D4]
  body: |
    Specify both directions of GitHub-sync. GitHub-sync is a v1
    first-class feature, not deferred to v1.5+ (RD7 writes the
    rationale separately).

    **Inbound (GitHub → v1).**
    - Webhook receiver at `/v1/webhooks/github`
    - Handles `issues.opened`, `issues.closed`, `issues.labeled`,
      `issues.assigned`, `issues.edited`, plus `issue_comment.*`
      events for handoff comments
    - Signature verification per GitHub's standard scheme
    - Idempotency keyed on `X-GitHub-Delivery` header

    **Outbound (v1 → GitHub).**
    - Periodic-pull cron worker for projects whose deployment can't
      expose public webhooks (firewalled, no public IP)
    - Reconciliation algorithm: compare app state with GitHub state,
      write deltas to GitHub via the API
    - Conflict resolution per Project.mode

    **Authoritative-side semantics per Project.mode value are this
    issue's output, not assumed input.** D2 defines the enum (per the
    data-model track); API7 defines what each enum value means for
    sync precedence. Per INT7's schema-update commitment, the chosen
    approach (split enum into github-authoritative vs app-authoritative,
    or add a separate `authoritative_side` column) lands as a D2 PR
    alongside `docs/integration/0005-sync-conflicts.md` (INT7's
    deliverable). Authoring API7 may proceed against the unsplit enum
    if INT7 hasn't closed yet, but should reserve the design surface
    for the split.

    **Cross-track deps:** API1 (conventions), D1 (Task), D2 (Project
    with mode), D4 (Handoff records — handoff comment ingestion writes
    to D4's table).

    Soft input: INT2's existing-OSS-sync research, if closed before
    this issue is claimed (per the kanban-worker SKILL.md guidance).

    **Output:** `docs/api/0006-github-sync.md` + sample reconciliation
    pseudocode.

