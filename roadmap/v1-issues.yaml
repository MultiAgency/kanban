- id: INT7
  track: integration
  title: "Conflict resolution rules in sync-mode"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D2, API7]
  body: |
    When sync-mode is active and the same issue is edited on both sides
    between sync ticks, specify which side wins.

    **Authoritative-side model.** Choose one of:

    - **(a) Split the enum.** Replace `sync-mode` in D2's `mode` enum
      with `sync-mode-github-authoritative` and `sync-mode-app-authoritative`.
    - **(b) Add a column.** Keep D2's `mode = sync-mode` and add a
      separate `authoritative_side` column on Project (`'github' | 'app'`).

    **Recommended: option (b) — add a separate `authoritative_side`
    column.** Reasoning: enum split would require renaming an existing
    value (`sync-mode` → `sync-mode-*`), which is a database migration
    touching every existing row; column addition is purely additive
    (the new column defaults to `NULL` or `'github'` for existing
    sync-mode rows). For v0/early-v1 with empty production state this
    is a wash, but the additive shape is more honest about what's
    happening — the mode is still "sync", and which side is authoritative
    is a separate axis. The agent claiming INT7 may override with
    rationale, but the recommendation accounts for additive-schema
    safety and conceptual orthogonality (mode = "what kind of sync";
    authoritative_side = "which side wins on conflict").

    **Schema-update commitment to D2.** Whichever approach is chosen,
    the schema update lands as part of INT7's deliverable, not a
    deferred follow-up. The PR for `docs/integration/0005-sync-conflicts.md`
    includes the D2 edit. D2's body has been authored with a
    code-comment marker indicating where the future edit lands so this
    PR is mechanical rather than archaeological.

    **Conflict cases to specify** (per side):
    - **Title** edited both sides → authoritative wins
    - **State** changed both sides → state-machine collapse:
      `closed > open`, `blocked > ready`, etc.
    - **Labels** diverged → authoritative wins; tag-only union TBD
    - **Assignee** changed → authoritative wins
    - **Comments** → always merge, both sides preserved

    **Cross-track deps:** D2 (Project mode — INT7 lands the schema
    update), API7 (sync mechanics — INT7 specifies the conflict rules
    that API7's reconciliation algorithm enforces).

    **Soft input:** INT2's existing-OSS-sync research, if closed before
    this issue is claimed (per the kanban-worker SKILL.md guidance on
    soft-input research handoffs).

    **Output:** `docs/integration/0005-sync-conflicts.md` plus the D2
    schema edit as part of the same PR.

