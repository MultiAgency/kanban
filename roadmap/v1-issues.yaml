- id: RD3
  track: research-docs
  title: "ADR: REST over GraphQL rationale"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Write the ADR documenting why v1 chose REST + OpenAPI over GraphQL.

    The decision is already made — v1 uses REST + JSON + OpenAPI, not
    GraphQL. This issue produces the permanent rationale doc that future
    contributors read when they wonder why.

    Cover:
    - **(a) GraphQL's strengths and where they would benefit v1.**
      Honest treatment — declarative client queries, single round-trip
      for nested data, type-safe contracts. These are real advantages.
    - **(b) Why those strengths don't outweigh the costs in v1's
      context.** Self-host friendliness (no GraphQL server infrastructure
      to run); GitHub-adjacent developer familiarity (REST is the
      ambient default); simpler client implementations (fetch + JSON
      vs Apollo / Relay / urql); easier debugging (curl works); OpenAPI
      tooling ecosystem.
    - **(c) What conditions would justify reconsidering.** v2 with a
      complex client UX that hits the n+1 problem; an enterprise
      customer requiring GraphQL contractually; etc.

    **Output:** `docs/research/adr-0001-rest-over-graphql.md`

- id: RD4
  track: research-docs
  title: "ADR: SSE over WebSockets rationale"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Write the ADR for v1's SSE choice. The decision is already made —
    v1 uses Server-Sent Events for real-time updates, not WebSockets.
    SSE is simpler to self-host and sufficient for kanban presence
    indicators. This issue produces the rationale doc.

    Cover:
    - **(a) WebSockets' strengths.** Bidirectional, lower per-message
      overhead, broader real-time use cases. Honest treatment.
    - **(b) Why those strengths don't matter for kanban presence.**
      Server-pushes-only — clients don't need a real-time channel back
      to the server (claim/complete/etc. are HTTP verbs per API5).
    - **(c) Self-host friendliness.** SSE works through standard HTTP
      infrastructure (proxies, load balancers, CDNs); WebSockets often
      need special proxy config (WS upgrade, sticky sessions). For
      self-hosters this is a meaningful operational simplification.
    - **(d) Reconnection semantics.** SSE has `Last-Event-ID` built in;
      WS reconnection is application-level.
    - **(e) What conditions would justify reconsidering.** Real-time
      collaborative editing in v2; bidirectional client-server
      streaming; etc.

    **Output:** `docs/research/adr-0002-sse-over-websockets.md`

- id: RD5
  track: research-docs
  title: "ADR: SQLite-default rationale"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Write the ADR for SQLite-default + Postgres-opt-in. The decision is
    already made — v1 uses SQLite by default; setting `DATABASE_URL=postgres`
    switches to managed Postgres without code changes. The portability
    constraint that makes this seamless is documented in D6.

    Cover:
    - **(a) Self-host friendliness.** Zero-deps for solo deployers;
      single-file database; backup is a file copy.
    - **(b) Portable-schema constraint as engineering tax.** Per D6's
      portability spec — what v1 gives up to keep both dialects working
      (no JSONB-specific operators, no Postgres-only types, etc.).
    - **(c) When Postgres is the right choice.** Multi-tenant deployments,
      high-concurrency writes, advanced indexing (GIN, GiST), full-text
      search beyond SQLite's FTS5 capabilities.
    - **(d) The seamless DATABASE_URL switch.** What changes (zero
      application code), what doesn't (Drizzle migration files run on
      both).
    - **(e) Migration thresholds.** Approximate data volume / concurrency
      / feature requirements that suggest moving to Postgres.

    **Output:** `docs/research/adr-0003-sqlite-default.md`

- id: RD6
  track: research-docs
  title: "ADR: multi-tenancy-deferred rationale"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Write the ADR for single-tenant default + `MULTI_TENANT=true` flag.
    The decision is already made — v1 ships single-tenant by default;
    multi-tenant is a flag, off until ops explicitly opt in.

    Cover:
    - **(a) Engineering cost of correct multi-tenancy.** Auth isolation,
      per-tenant billing, data export, support burden, noisy-neighbor
      handling, per-tenant migrations. Months of work that has nothing
      to do with whether the underlying coordination model is correct.
    - **(b) Why v1 doesn't need it.** v1's job is validating the product;
      validation doesn't require scale. Self-hosters and the bootstrap
      project all run single-tenant.
    - **(c) The deferred-but-not-blocked architecture.** `tenant_id`
      reserved on every table from day one (D7's surface); schema
      migrations are pure backfills when the flag flips on; auth and
      isolation work concentrate at flag-flip time, not v1 ship time.
    - **(d) What triggers flipping the flag.** Real demand from a
      multi-tenant deployer paying for the feature, hosted-instance
      launch, or strategic partnership requiring it.

    **Output:** `docs/research/adr-0004-multi-tenancy-deferred.md`

- id: RD7
  track: research-docs
  title: "ADR: GitHub-sync as first-class v1 feature"
  labels:
    - ready
    - agent-eligible
    - skill:writing
  depends_on: []
  body: |
    Write the ADR for GitHub-sync being in v1 (not deferred to v1.5+).
    The decision is already made — GitHub-sync is bidirectional and
    present in v1; sync-mode is not a post-launch feature.

    Cover:
    - **(a) The convention's installed base and migration path.** v0's
      installed base lives on GitHub Issues with the kanban convention.
      v1 inheriting that audience requires a migration path that doesn't
      ask users to abandon their existing data.
    - **(b) Why pure-app-only would abandon the convention's audience.**
      The convention's durability commitment (per SPEC.md Objective)
      explicitly says the convention persists alongside the app
      indefinitely; v1 has to honor that.
    - **(c) Engineering cost of bidirectional sync.** Webhook receiver
      (API7 inbound), pull-mode cron worker (API7 outbound),
      reconciliation algorithm, conflict resolution rules (INT7),
      schema additions (D2's mode enum + INT7's authoritative_side
      column).
    - **(d) Why it's worth paying that cost in v1.** Sync-mode is the
      load-bearing feature for adoption — without it, every existing
      convention user has to abandon their data to try v1, which is
      a non-starter.
    - **(e) The convention persists indefinitely.** v1 is additive,
      not a replacement. Pure-convention deployments must keep working
      forever.

    **Output:** `docs/research/adr-0005-github-sync-first-class.md`

