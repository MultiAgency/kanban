- id: INT3
  track: integration
  title: "Project mode lifecycle and migration paths"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [D1, D2]
  body: |
    Specify the system-level lifecycle for project modes. v1 supports
    three modes: pure-convention (issues on GitHub, no app row),
    pure-app (issues in app DB, no GitHub mirror), sync-mode (both,
    authoritative side per project setting). The three-mode design lets
    teams adopt v1 incrementally — start with the convention on GitHub,
    add the app for the dashboard, optionally drop GitHub for fully-
    contained projects.

    Cover:

    - **(a) Onboarding.** A project starts as pure-convention (no app
      row). The user opts in by pointing the app at a GitHub repo →
      Project row created in pure-app or sync-mode. Sync-mode imports
      existing issues, labels, dependencies, and handoff history (the
      importer is INT6's scope).
    - **(b) Migration paths.**
      - pure-convention → sync-mode: additive, no data loss
      - sync-mode → pure-app: removes GitHub sync, keeps `github_issue_url`
        as historical reference
      - pure-app → sync-mode: back-syncs to a designated GitHub repo
      - pure-app → pure-convention: deferred to v1.5
    - **(c) Off-ramp.** When a user wants out of v1, export to GitHub
      Issues with handoff comments preserved. Off-ramp is a v1 feature,
      not v1.5 — users must be able to leave without losing data per
      the convention's durability commitment.

    **Cross-track deps:** D1 (Task — for migration semantics on per-task
    state), D2 (Project — for the mode enum and `github_repo_url`).

    **Output:** `docs/integration/0001-project-modes.md`

- id: INT4
