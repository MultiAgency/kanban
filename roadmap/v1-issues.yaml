    Design the importer that takes an existing GitHub repo with v0
    convention usage and creates a v1 Project in sync-mode preserving
    history.

    Cover:

    - **Issue-by-issue import.** Walk the repo's issues; for each:
      - Map to a Task row per D1's schema with `github_issue_url`
        preserved as the join key
      - Translate `skill:*` labels to TaskSkill joins per D8's schema
      - Parse dependency body links via the v0 dependencies parser
        (`src/lib/dependencies.ts`) to populate Dependency rows per D5
      - Walk issue comments; for each comment containing a ` ```handoff `
        fence, parse via the v0 `parseHandoff` library and write a
