- id: UI3
  track: ui
  title: "Board view layout and card design"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [UI2]
  body: |
    Specify the kanban board view.

    Cover:
    - **Columns.** Four columns matching D1's state enum: `ready`,
      `in-progress`, `blocked`, plus a closed/done view (which may be
      hidden by default and revealed via toggle).
    - **Column ordering and visual treatment.** Per UI2 tokens.
    - **Card content.** Title, assignee avatar with tooltip, skill
      badges (chip form), dependency count icon if >0, last-activity
      timestamp.
    - **Card states.** Default, hover, focused, dragging.
    - **Drag-and-drop semantics.** Drag is an input affordance only —
      every state transition resolves to the corresponding verb endpoint
      from API5. Drag `ready` → `in-progress` invokes
      `POST /v1/tasks/:id/claim` under the hood; drag `in-progress` →
      `blocked` opens a block-reason modal then invokes
      `POST /v1/tasks/:id/block`; etc. **The UI never bypasses the
      verb endpoints.** Drag is rejected (with reason toast) when the
      underlying transition would be invalid. **Optimistic UI is
      allowed visually** (card moves on drag-end before server response)
      but state changes must round-trip the verb endpoint. The
      endpoint's response is authoritative; the optimistic update
      reverts on rejection (with reason toast).
    - **The "+" affordance** for creating a task on an empty column or
      from the column header.
    - **Empty / loading / error states** using UI2's canonical patterns.
      Novel states (e.g. "no `agent-eligible` issues for your skills")
      extend UI2's vocabulary in this issue's deliverable.

    **Cross-track deps:** UI2 (design system).

    **Soft input** from RD8 (agent-native UX patterns) for agent
    presence on cards, if RD8 has closed by claim time. Per
    kanban-worker SKILL.md, read RD8's handoff first if available.

