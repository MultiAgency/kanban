  depends_on: []
  body: |
    Establish v1's design system. Dark mode is required from day one —
    the design system is dark-mode primary, light secondary. (Reasoning:
    the target user is a developer working long sessions; dark-first
    matches editor / terminal / GitHub-dark norms.)

    Cover:

    - **Design tokens.** Colors (primary, surface, text, semantic),
      typography (scale, weights, line-heights), spacing (4px grid),
      radii, shadows.
    - **Dark mode primary, light secondary.** Both themes shipping in
