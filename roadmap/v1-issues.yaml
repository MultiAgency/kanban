- id: UI4
  track: ui
  title: "Task detail side panel"
  labels:
    - blocked
    - agent-eligible
    - skill:writing
  depends_on: [UI2]
  body: |
    Specify the panel that opens when a card is clicked.

    Cover:
    - **Layout.** Pick one with rationale: overlay/sheet, push-content,
      or modal. **Recommend push-content.** *Trade-off analysis:*
      overlay/sheet (Linear, Asana style) preserves board visibility
      but creates a focus-management problem when multiple cards are
      clicked in succession (each opens a new sheet, stacking
      complexity grows — UX, not implementation). Modal blocks board
      context entirely and breaks drag-to-related-card workflows.
      Push-content keeps the board visible to the left while giving
      the detail panel room to render long bodies and threaded
      comments. The agent claiming UI4 may override with rationale,
      but the recommendation accounts for the most likely real
      workflows.
    - **Header.** Title, state badge, assignee avatar, primary action
      button per state (claim if `ready`, complete if `in-progress`,
      block if `in-progress`, unblock if `blocked`).
    - **Body.** Rendered markdown.
    - **Comments thread.** Standard comment list.
    - **Handoff thread.** Separate from comments — uses UI7 renderer
      for handoff cards (cross-issue reference; UI7 specifies the
      renderer, UI4 specifies the thread layout).
    - **Dependency mini-graph.** A small inline graph showing direct
      parents and children only (full graph is UI5's component).
    - **Action buttons by state.** Map state → allowed actions per
      SPEC.md §Convention rules and API5's verb endpoints.
    - **Empty / loading / error states** using UI2's canonical patterns.

    **Cross-track deps:** UI2 (design system).

    **Soft input** from RD8 (agent-native UX patterns) for agent action
    attribution in comments and handoffs, if RD8 has closed by claim
    time.

    **Output:** `docs/ui/0002-task-detail.md` + wireframe.

- id: UI5
  track: ui
  title: "Dependency graph visualization"
  labels:
    - blocked
    - agent-eligible
    - skill:research
  depends_on: [UI2]
  body: |
    Specify the lightweight dependency graph component.

    **Library research.** Compare candidates: Cytoscape.js, D3-force,
    react-force-graph, vis.js. Pick on bundle size + license + interactive
    capabilities + TypeScript support.

    **Bundle size cap: graph component contributes <100KB to the
    bundle.** The graph is lightweight (max ~30 visible edges per the
    edge-hiding rule below); a heavyweight library like Cytoscape.js
    (~500KB minified) is over-fit for this scope and likely fails the
    cap. Recommend react-force-graph (~50KB) or a custom 200-line SVG
    implementation as the realistic options.

    Cover:
    - **Force-directed layout.** Default settings + tuning notes.
    - **Node rendering.** Issue title truncated, state color from UI2's
      tokens, click → side panel (UI4 integration).
    - **Edge rendering.** `blocks` solid, `tracks` dashed (matches D5's
      `kind` enum).
    - **Zoom / pan controls.** Standard.
    - **Edge-hiding past 30 nodes.** Beyond ~30 visible nodes the graph
      becomes visually unreadable; collapse distant edges into
      "+N more" indicators that expand on demand.
    - **Focus mode.** Click a node → highlight its lineage (ancestors
      and descendants).
    - **Empty / loading / error states** using UI2's canonical patterns.

