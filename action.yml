name: Promote blocked issues to ready
description: When an issue closes, promote any blocked children whose full parent set is now closed via body-text dependency declarations.
author: MultiAgency

inputs:
  github-token:
    description: "Token used to read issues and write labels. The calling workflow needs `issues: write` and `contents: read`."
    default: ${{ github.token }}

runs:
  using: node24
  main: dist/index.js
