name = "kanban-webhook"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# Non-secret env vars. Secrets are set via `wrangler secret put` (see README.md).
[vars]
IRONCLAW_WEBHOOK_URL = "https://ironclaw.multiagency.services/webhook"

workers_dev = true

# Custom domain at github.multiagency.services (source-oriented — leaves the
# bare `kanban.multiagency.services` namespace free for the v1 hosted app per
# SPEC.md §Objective). Workers.dev URL is also kept enabled as a fallback in
# case of DNS hiccups during a redeploy.
[[routes]]
pattern = "github.multiagency.services"
custom_domain = true
