# worked-example.yaml — illustrative scaffold output
#
# This is the kind of output `docs/scaffolding/v1-to-roadmap.md` produces
# when fed `roadmap/v1.yaml` (this repo's actual v1 vision).
#
# IT IS NOT THE ACTUAL ROADMAP for MultiAgency/kanban. The actual roadmap
# lives at `roadmap/v1-issues.yaml` (45 hand-crafted entries targeting
# v1.0.0). This file demonstrates the scaffold prompt's output shape for
# fork users learning the pattern.
#
# Source of v0.1.1 + v0.2.0 content: the v0.1.1-roadmap.md proposal in
# IronClaw workspace memory (`memory_documents` table). The scaffold
# prompt expresses that proposal as kanban-conventional YAML, then decays
# detail with release distance.
#
# Schema follows roadmap/v1-issues.yaml: letter-prefix IDs by track,
# labels per `.github/labels.yml`, depends_on referencing other IDs.
# In a real scaffold output the letter-prefix range would NOT collide
# with existing v1-issues.yaml IDs — this example uses S1, S2, ... for
# clarity ("Scaffold" prefix) so it's obvious these are illustrative.

# ============================================================
# v0.1.1 (Patch) — claim-state lint
# Full body — this is the immediate-release scope.
# ============================================================

- id: S1
  track: integration
  title: "Claim-state lint GitHub Action"
  labels:
    - ready
    - agent-eligible
    - skill:code
  depends_on: []
  body: |
    Detect and report kanban half-states (e.g., an issue that is
    self-assigned but still carries the `ready` label, or `in-progress`
    without an assignee). Half-states silently break the convention's
    invariants and are a common fork-user pitfall.

    **Acceptance:** GitHub Action `.github/workflows/claim-state-lint.yml`
    runs on `issues.opened`, `issues.labeled`, `issues.unlabeled`, and
    `issues.assigned`. Scans the affected issue for the two illegal
    combinations:

    - assigned + `ready` (claim ritual missing the label swap)
    - `in-progress` + no assignee (label set without self-assign)

    On violation, post a comment on the offending issue naming the
    inconsistency and the suggested fix. Optionally post a summary to a
    dedicated `#lint-report` issue (created on first run if missing).

    **Verify:** create a test issue with each illegal combination;
    confirm the action fires and posts the expected comment. Confirm no
    false positives on the valid states (`ready` alone, `in-progress` +
    assignee, `blocked` + assignee + parent refs).

    **Output:** `.github/workflows/claim-state-lint.yml` +
    `src/lint/claim-state.ts` (the action handler) + tests at
    `tests/claim-state.test.ts`.

